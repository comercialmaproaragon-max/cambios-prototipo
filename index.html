<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<title>Cambios Prototipo — Mapro Aragón</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root{
    --naranja:#F2611C; --naranja-osc:#d04f10; --negro:#111114; --gris:#f6f5f3;
    --texto:#1c1c1e; --borde:#e4e2df; --rojo:#d23b2f;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; background:var(--gris); color:var(--texto)}
  header{position:sticky; top:0; z-index:10; background:#fff; border-bottom:3px solid var(--naranja);
    padding:10px 48px 7px; text-align:center; box-shadow:0 1px 4px rgba(0,0,0,.07)}
  .logo-svg{height:32px; display:block; margin:0 auto}
  #subtitulo{font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:3px; color:var(--naranja); margin-top:3px}
  .btn-back{position:absolute; left:4px; top:12px; background:none; border:none; color:var(--negro);
    font-size:30px; padding:0 12px 4px; cursor:pointer; display:none; line-height:1}
  main{padding:14px; max-width:760px; margin:0 auto}
  .vista{display:none}
  .vista.activa{display:block}
  .card{background:#fff; border-radius:10px; padding:14px; margin-bottom:10px;
    border:1px solid var(--borde); box-shadow:0 1px 2px rgba(0,0,0,.05)}
  .card.clicable{cursor:pointer}
  .card h3{margin:0 0 4px; font-family:'Bebas Neue',sans-serif; font-weight:400; font-size:21px; letter-spacing:1.2px; color:var(--negro)}
  .card .sub{font-size:13px; color:#6b6b70}
  .vacio{text-align:center; color:#8e8e93; padding:48px 16px; font-size:15px}
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; border:none; border-radius:8px;
    padding:13px 18px; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px;
    cursor:pointer; width:100%; margin-top:8px}
  .btn-pri{background:var(--naranja); color:#fff}
  .btn-pri:active{background:var(--naranja-osc)}
  .btn-sec{background:#fff; color:var(--negro); border:1.5px solid var(--negro)}
  .btn-peligro{background:none; color:var(--rojo); border:none; font-size:14px; font-weight:600; padding:12px; width:100%; cursor:pointer}
  .btn-mini{background:none; border:1.5px solid var(--naranja); color:var(--naranja); border-radius:8px;
    font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:1.5px; padding:7px 12px; cursor:pointer; margin-top:10px}
  label{display:block; font-size:13px; font-weight:600; margin:12px 0 4px; color:#48484d}
  input[type=text], textarea{width:100%; padding:11px 12px; font-size:16px; border:1.5px solid var(--borde);
    border-radius:8px; background:#fff; font-family:inherit}
  input:focus, textarea:focus{outline:none; border-color:var(--naranja)}
  textarea{resize:vertical; min-height:72px}
  .ficha{font-size:13.5px; color:#48484d; line-height:1.55}
  .ficha b{color:var(--texto)}
  /* foto */
  .foto-wrap{position:relative; border-radius:10px; overflow:hidden; background:#000; touch-action:manipulation}
  .foto-wrap img{display:block; width:100%; height:auto}
  #lienzo{position:absolute; left:0; top:0; width:100%; height:100%; pointer-events:none}
  .foto-wrap.dibujando .marca{pointer-events:none}
  /* barra de herramientas de dibujo */
  .barra-dibujo{display:flex; gap:9px; margin:10px 0 2px; justify-content:center; align-items:center; flex-wrap:wrap}
  .herr{width:40px; height:40px; border-radius:50%; border:2px solid var(--borde); background:#fff;
    font-size:17px; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0}
  .herr.activa{border-color:var(--negro); box-shadow:0 0 0 3px rgba(242,97,28,.45)}
  .marca{position:absolute; width:30px; height:30px; margin:-15px 0 0 -15px; border-radius:50%;
    background:var(--naranja); border:2.5px solid #fff; color:#fff; font-size:14px; font-weight:700;
    display:flex; align-items:center; justify-content:center; box-shadow:0 1px 4px rgba(0,0,0,.45); cursor:pointer}
  .ayuda{font-size:13px; color:#8e8e93; text-align:center; margin:10px 0 4px}
  .cambio-item{display:flex; gap:10px; align-items:flex-start; padding:11px 0; border-bottom:1px solid var(--borde)}
  .cambio-item:last-child{border-bottom:none}
  .cambio-num{flex-shrink:0; width:24px; height:24px; border-radius:50%; background:var(--naranja); color:#fff;
    font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; margin-top:1px}
  .cambio-num.sin{background:#8e8e93}
  .cambio-txt{flex:1; font-size:14.5px; line-height:1.45}
  .miniatura{width:100%; border-radius:8px; display:block}
  .mini-card{padding:10px}
  .mini-card .sub{margin-top:8px}
  /* modal */
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; z-index:50; align-items:flex-end; justify-content:center}
  .overlay.activa{display:flex}
  .hoja{background:#fff; width:100%; max-width:560px; border-radius:14px 14px 0 0; border-top:3px solid var(--naranja);
    padding:18px 16px calc(18px + env(safe-area-inset-bottom))}
  .hoja h3{margin:0 0 4px; font-family:'Bebas Neue',sans-serif; font-weight:400; font-size:20px; letter-spacing:1.5px}
  .fila-btns{display:flex; gap:10px}
  .fila-btns .btn{margin-top:14px}
  #estado-export{font-size:13px; color:#8e8e93; text-align:center; margin-top:8px; min-height:18px}
</style>
</head>
<body>
<header>
  <button class="btn-back" id="btn-back" aria-label="Volver">&#8249;</button>
  <svg class="logo-svg" viewBox="0 0 380 80" xmlns="http://www.w3.org/2000/svg" aria-label="Mapro Aragón">
    <path d="M 30 8 Q 8 40 30 72" fill="none" stroke="#F2611C" stroke-width="13" stroke-linecap="round"/>
    <path d="M 350 8 Q 372 40 350 72" fill="none" stroke="#F2611C" stroke-width="13" stroke-linecap="round"/>
    <text x="190" y="40" text-anchor="middle" dominant-baseline="central"
      font-family="'Bebas Neue',ArialNarrow,'Arial Narrow',sans-serif" font-size="52" letter-spacing="5" fill="#111114">MAPRO ARAGÓN</text>
  </svg>
  <div id="subtitulo">Cambios prototipo</div>
</header>
<main>

  <!-- LISTA DE REVISIONES -->
  <section class="vista activa" id="vista-lista">
    <div id="lista-proyectos"></div>
    <button class="btn btn-pri" id="btn-nuevo">+ Nueva revisión</button>
    <div style="text-align:center; font-size:11px; color:#b0b0b4; margin-top:18px">versión 6</div>
  </section>

  <!-- FORMULARIO REVISIÓN (alta y edición) -->
  <section class="vista" id="vista-form">
    <div class="card">
      <label>Nº de pedido</label>
      <input type="text" id="f-pedido" placeholder="26/062">
      <button class="btn-mini" id="btn-buscar-pedido">⌕ Rellenar todo desde el pedido</button>
      <label>MPR del proyecto</label>
      <input type="text" id="f-mpr" placeholder="MPR-1234" autocapitalize="characters">
      <label>Nombre del contenedor</label>
      <input type="text" id="f-nombre" placeholder="Contenedor 15/27 con puerta">
      <label>Dimensiones</label>
      <input type="text" id="f-dim" placeholder="1200 x 1000 x 990">
      <label>Cliente</label>
      <input type="text" id="f-cliente" placeholder="Nombre del cliente">
      <label>Fecha de revisión</label>
      <input type="text" id="f-fecha">
    </div>
    <button class="btn btn-pri" id="btn-guardar-proy">Guardar</button>
  </section>

  <!-- DETALLE DE REVISIÓN -->
  <section class="vista" id="vista-proyecto">
    <div class="card">
      <div class="ficha" id="ficha-proyecto"></div>
      <button class="btn-mini" id="btn-editar-proy">✎ Editar datos</button>
    </div>
    <div id="lista-fotos"></div>
    <input type="file" id="input-foto" accept="image/*" capture="environment" hidden>
    <button class="btn btn-pri" id="btn-foto">📷 Añadir foto</button>
    <button class="btn btn-sec" id="btn-export">Generar Word</button>
    <button class="btn btn-sec" id="btn-compartir" style="display:none">Compartir Word</button>
    <div id="estado-export"></div>
    <button class="btn-peligro" id="btn-borrar-proy">Eliminar esta revisión</button>
  </section>

  <!-- DETALLE DE FOTO -->
  <section class="vista" id="vista-foto">
    <div class="foto-wrap" id="foto-wrap"><img id="foto-img" alt="Foto del prototipo"><canvas id="lienzo"></canvas></div>
    <div class="barra-dibujo" id="barra-dibujo">
      <button class="herr activa" id="herr-marca" title="Marca numerada">📍</button>
      <button class="herr color" data-color="#e02020" style="background:#e02020" title="Lápiz rojo"></button>
      <button class="herr color" data-color="#1565e0" style="background:#1565e0" title="Lápiz azul"></button>
      <button class="herr color" data-color="#14a035" style="background:#14a035" title="Lápiz verde"></button>
      <button class="herr color" data-color="#f5c400" style="background:#f5c400" title="Lápiz amarillo"></button>
      <button class="herr color" data-color="#ffffff" style="background:#ffffff" title="Lápiz blanco"></button>
      <button class="herr color" data-color="#111114" style="background:#111114" title="Lápiz negro"></button>
      <button class="herr" id="herr-deshacer" title="Deshacer último trazo">↩</button>
    </div>
    <p class="ayuda" id="ayuda-foto">Toca sobre la foto para añadir una marca numerada, o elige un color y dibuja a mano.</p>
    <div class="card" id="card-cambios"><div id="lista-cambios"></div></div>
    <button class="btn btn-sec" id="btn-cambio-libre">+ Cambio sin marca en foto</button>
    <button class="btn-peligro" id="btn-borrar-foto">Eliminar esta foto</button>
  </section>

</main>

<!-- MODAL ELECCIÓN DE CONTENEDOR DEL PEDIDO -->
<div class="overlay" id="modal-pedido">
  <div class="hoja">
    <h3>Este pedido tiene varios contenedores</h3>
    <div id="lista-opciones-pedido"></div>
    <button class="btn-peligro" id="pedido-cancelar">Cancelar</button>
  </div>
</div>

<!-- MODAL CAMBIO -->
<div class="overlay" id="modal">
  <div class="hoja">
    <h3 id="modal-titulo">Modificación</h3>
    <label>Describe el cambio</label>
    <textarea id="modal-texto" placeholder="Ej.: eliminar refuerzo lateral y bajar asa 50 mm"></textarea>
    <div class="fila-btns">
      <button class="btn btn-sec" id="modal-cancelar">Cancelar</button>
      <button class="btn btn-pri" id="modal-guardar">Guardar</button>
    </div>
    <button class="btn-peligro" id="modal-borrar" style="display:none">Eliminar este cambio</button>
  </div>
</div>

<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<script>
const $ = s => document.querySelector(s);
let db, proyectoActual = null, fotoActual = null, marcaEditando = null, urlFotoActual = null, editandoProyectoId = null;

/* iOS antiguos y navegadores integrados no siempre tienen crypto.randomUUID */
function uuid(){
  if (crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

/* ---------- IndexedDB ---------- */
function abrirDB(){
  return new Promise((res, rej) => {
    const r = indexedDB.open('cambios-prototipo', 1);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      d.createObjectStore('proyectos', {keyPath:'id'});
      const f = d.createObjectStore('fotos', {keyPath:'id'});
      f.createIndex('porProyecto', 'proyectoId');
    };
    r.onsuccess = e => res(e.target.result);
    r.onerror = () => rej(r.error);
  });
}
const tx = (store, modo, fn) => new Promise((res, rej) => {
  const t = db.transaction(store, modo);
  const req = fn(t.objectStore(store));
  req.onsuccess = () => res(req.result);
  req.onerror = () => rej(req.error);
});
const guardar  = (store, obj) => tx(store, 'readwrite', s => s.put(obj));
const borrar   = (store, id)  => tx(store, 'readwrite', s => s.delete(id));
const obtener  = (store, id)  => tx(store, 'readonly',  s => s.get(id));
const todos    = store        => tx(store, 'readonly',  s => s.getAll());
const fotosDe  = pid => new Promise((res, rej) => {
  const req = db.transaction('fotos').objectStore('fotos').index('porProyecto').getAll(pid);
  req.onsuccess = () => res(req.result.sort((a,b) => a.creada - b.creada));
  req.onerror = () => rej(req.error);
});

/* ---------- Navegación ---------- */
function mostrar(vista, titulo){
  document.querySelectorAll('.vista').forEach(v => v.classList.remove('activa'));
  $('#vista-' + vista).classList.add('activa');
  $('#subtitulo').textContent = titulo;
  $('#btn-back').style.display = vista === 'lista' ? 'none' : 'block';
  window.scrollTo(0, 0);
}
$('#btn-back').onclick = () => {
  if ($('#vista-foto').classList.contains('activa')) abrirProyecto(proyectoActual.id);
  else if ($('#vista-form').classList.contains('activa') && editandoProyectoId) abrirProyecto(editandoProyectoId);
  else verLista();
};

/* ---------- Lista de revisiones ---------- */
async function verLista(){
  proyectoActual = null;
  const lista = (await todos('proyectos')).sort((a,b) => b.creado - a.creado);
  const cont = $('#lista-proyectos');
  cont.innerHTML = lista.length ? '' : '<div class="vacio">No hay revisiones todavía.<br>Crea la primera con el botón de abajo.</div>';
  for (const p of lista){
    const div = document.createElement('div');
    div.className = 'card clicable';
    div.innerHTML = `<h3></h3><div class="sub"></div>`;
    div.querySelector('h3').textContent = `${p.mpr} — ${p.nombre}`;
    div.querySelector('.sub').textContent = `${p.cliente ? p.cliente + ' · ' : ''}${p.fecha}`;
    div.onclick = () => abrirProyecto(p.id);
    cont.appendChild(div);
  }
  mostrar('lista', 'Cambios prototipo');
}

/* ---------- Búsqueda de pedido (datos cifrados) ---------- */
let pedidosCache = null;
async function obtenerPedidos(){
  if (pedidosCache) return pedidosCache;
  let clave = localStorage.getItem('clavePedidos');
  let recordada = !!clave;
  if (!clave){
    clave = prompt('Introduce la clave de Mapro para activar la búsqueda de pedidos (solo se pide una vez):');
    if (!clave) return null;
  }
  const resp = await fetch('datos-pedidos.enc');
  if (!resp.ok) throw new Error('No se pudo descargar el fichero de pedidos. Necesitas conexión la primera vez.');
  const buf = await resp.arrayBuffer();
  const salt = buf.slice(0, 16), nonce = buf.slice(16, 28), ct = buf.slice(28);
  const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(clave.trim()), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' },
    base, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
  try {
    const plano = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: nonce }, key, ct);
    pedidosCache = JSON.parse(new TextDecoder().decode(plano));
    localStorage.setItem('clavePedidos', clave);
    return pedidosCache;
  } catch (e){
    localStorage.removeItem('clavePedidos');
    throw new Error(recordada
      ? 'La clave guardada ya no es válida. Vuelve a intentarlo para introducirla de nuevo.'
      : 'Clave incorrecta.');
  }
}
function normalizarPedido(t){
  const m = String(t).match(/(\d{2})\D*(\d{1,4})/);
  return m ? m[1] + '/' + m[2].padStart(3, '0') : null;
}
function aplicarPedido(it){
  if (it.mpr) $('#f-mpr').value = it.mpr;
  if (it.nombre) $('#f-nombre').value = it.nombre;
  if (it.dimensiones) $('#f-dim').value = it.dimensiones;
  if (it.cliente) $('#f-cliente').value = it.cliente;
}
function elegirPedido(items){
  const cont = $('#lista-opciones-pedido');
  cont.innerHTML = '';
  items.forEach(it => {
    const b = document.createElement('button');
    b.className = 'btn btn-sec';
    b.style.cssText = 'letter-spacing:0; font-family:inherit; font-size:14px; text-align:left';
    b.textContent = (it.nombre || '(sin descripción)') + (it.mpr ? ' — ' + it.mpr : '');
    b.onclick = () => { aplicarPedido(it); $('#modal-pedido').classList.remove('activa'); };
    cont.appendChild(b);
  });
  $('#modal-pedido').classList.add('activa');
}
$('#pedido-cancelar').onclick = () => $('#modal-pedido').classList.remove('activa');
$('#modal-pedido').onclick = e => { if (e.target === $('#modal-pedido')) $('#modal-pedido').classList.remove('activa'); };
$('#btn-buscar-pedido').onclick = async () => {
  try {
    const num = normalizarPedido($('#f-pedido').value);
    if (!num){ alert('Escribe el número de pedido, por ejemplo 26/062.'); return; }
    const datos = await obtenerPedidos();
    if (!datos) return;
    const items = datos[num];
    if (!items || !items.length){ alert('No encuentro el pedido ' + num + '.\nComprueba el número o rellena los campos a mano.'); return; }
    $('#f-pedido').value = num;
    if (items.length === 1) aplicarPedido(items[0]);
    else elegirPedido(items);
  } catch (e){ alert(e.message); }
};

/* ---------- Alta y edición de revisión ---------- */
$('#btn-nuevo').onclick = () => {
  editandoProyectoId = null;
  ['f-pedido','f-mpr','f-nombre','f-dim','f-cliente'].forEach(id => $('#' + id).value = '');
  $('#f-fecha').value = new Date().toLocaleDateString('es-ES');
  mostrar('form', 'Nueva revisión');
};
$('#btn-editar-proy').onclick = () => {
  const p = proyectoActual;
  editandoProyectoId = p.id;
  $('#f-pedido').value = p.pedido || '';
  $('#f-mpr').value = p.mpr;
  $('#f-nombre').value = p.nombre;
  $('#f-dim').value = p.dimensiones;
  $('#f-cliente').value = p.cliente;
  $('#f-fecha').value = p.fecha;
  mostrar('form', 'Editar revisión');
};
$('#btn-guardar-proy').onclick = async () => {
  try {
  const mpr = $('#f-mpr').value.trim(), nombre = $('#f-nombre').value.trim();
  if (!mpr || !nombre){ alert('Indica al menos el MPR y el nombre del contenedor.'); return; }
  if (!db) throw new Error('Sin acceso al almacenamiento. Abre la app en Safari normal (no en el navegador de WhatsApp ni en navegación privada).');
  let p;
  if (editandoProyectoId){
    p = await obtener('proyectos', editandoProyectoId);
  } else {
    p = { id: uuid(), creado: Date.now() };
  }
  p.pedido = $('#f-pedido').value.trim();
  p.mpr = mpr;
  p.nombre = nombre;
  p.dimensiones = $('#f-dim').value.trim();
  p.cliente = $('#f-cliente').value.trim();
  p.fecha = $('#f-fecha').value.trim() || new Date().toLocaleDateString('es-ES');
  await guardar('proyectos', p);
  editandoProyectoId = null;
  abrirProyecto(p.id);
  } catch (e){ alert('No se pudo guardar la revisión.\n\n' + e.message); }
};

/* ---------- Detalle de revisión ---------- */
async function abrirProyecto(id){
  proyectoActual = await obtener('proyectos', id);
  fotoActual = null;
  const p = proyectoActual;
  $('#ficha-proyecto').innerHTML =
    (p.pedido ? `<b>Pedido:</b> ${esc(p.pedido)}<br>` : '') +
    `<b>MPR:</b> ${esc(p.mpr)}<br><b>Contenedor:</b> ${esc(p.nombre)}<br>` +
    (p.dimensiones ? `<b>Dimensiones:</b> ${esc(p.dimensiones)}<br>` : '') +
    (p.cliente ? `<b>Cliente:</b> ${esc(p.cliente)}<br>` : '') +
    `<b>Fecha:</b> ${esc(p.fecha)}`;
  const fotos = await fotosDe(id);
  const cont = $('#lista-fotos');
  cont.innerHTML = fotos.length ? '' : '<div class="vacio">Sin fotos. Añade la primera foto del prototipo.</div>';
  fotos.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'card clicable mini-card';
    const img = document.createElement('img');
    img.className = 'miniatura';
    img.src = URL.createObjectURL(f.blob);
    img.onload = () => URL.revokeObjectURL(img.src);
    const sub = document.createElement('div');
    sub.className = 'sub';
    sub.textContent = `Foto ${i + 1} · ${f.marcas.length} cambio${f.marcas.length === 1 ? '' : 's'}`;
    div.append(img, sub);
    div.onclick = () => abrirFoto(f.id);
    cont.appendChild(div);
  });
  $('#btn-compartir').style.display = (navigator.canShare ? 'inline-flex' : 'none');
  $('#estado-export').textContent = '';
  mostrar('proyecto', p.mpr);
}
$('#btn-foto').onclick = () => $('#input-foto').click();
$('#input-foto').onchange = async e => {
  const archivo = e.target.files[0];
  e.target.value = '';
  if (!archivo) return;
  try {
    const blob = await reducirImagen(archivo, 1600);
    const f = { id: uuid(), proyectoId: proyectoActual.id, blob, marcas: [], creada: Date.now() };
    await guardar('fotos', f);
    abrirFoto(f.id);
  } catch (err){ alert('No se pudo guardar la foto.\n\n' + err.message); }
};
$('#btn-borrar-proy').onclick = async () => {
  if (!confirm('¿Eliminar esta revisión y todas sus fotos?')) return;
  for (const f of await fotosDe(proyectoActual.id)) await borrar('fotos', f.id);
  await borrar('proyectos', proyectoActual.id);
  verLista();
};

/* Reduce la foto a un ancho máximo para no llenar el almacenamiento del móvil */
function reducirImagen(archivo, maxLado){
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const escala = Math.min(1, maxLado / Math.max(img.width, img.height));
      if (escala === 1 && archivo.type === 'image/jpeg'){ res(archivo); return; }
      const c = document.createElement('canvas');
      c.width = Math.round(img.width * escala);
      c.height = Math.round(img.height * escala);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      c.toBlob(b => res(b || archivo), 'image/jpeg', 0.88);
    };
    img.onerror = () => res(archivo);
    img.src = URL.createObjectURL(archivo);
  });
}

/* ---------- Detalle de foto ---------- */
async function abrirFoto(id){
  fotoActual = await obtener('fotos', id);
  if (!fotoActual.trazos) fotoActual.trazos = [];
  if (urlFotoActual) URL.revokeObjectURL(urlFotoActual);
  urlFotoActual = URL.createObjectURL(fotoActual.blob);
  const img = $('#foto-img');
  img.onload = ajustarLienzo;
  img.src = urlFotoActual;
  setModo(null);
  pintarMarcas();
  pintarCambios();
  mostrar('foto', 'Foto y cambios');
  ajustarLienzo();
}

/* ---------- Lápiz de colores sobre la foto ---------- */
let modoLapiz = null, trazoActual = null;
const lienzo = $('#lienzo');

function ajustarLienzo(){
  const img = $('#foto-img');
  if (!img.clientWidth) return;
  const dpr = window.devicePixelRatio || 1;
  lienzo.width = Math.round(img.clientWidth * dpr);
  lienzo.height = Math.round(img.clientHeight * dpr);
  pintarTrazos();
}
window.addEventListener('resize', () => { if (fotoActual) ajustarLienzo(); });

function dibujarTrazos(g, ancho, alto, trazos){
  for (const t of trazos){
    if (!t.puntos || t.puntos.length < 2) continue;
    g.strokeStyle = t.color;
    g.lineWidth = Math.max(2.5, (t.grosor || 0.008) * ancho);
    g.lineCap = 'round'; g.lineJoin = 'round';
    g.beginPath();
    g.moveTo(t.puntos[0].x * ancho, t.puntos[0].y * alto);
    for (let i = 1; i < t.puntos.length; i++) g.lineTo(t.puntos[i].x * ancho, t.puntos[i].y * alto);
    g.stroke();
  }
}
function pintarTrazos(){
  if (!fotoActual) return;
  const g = lienzo.getContext('2d');
  g.clearRect(0, 0, lienzo.width, lienzo.height);
  const lista = trazoActual ? [...fotoActual.trazos, trazoActual] : fotoActual.trazos;
  dibujarTrazos(g, lienzo.width, lienzo.height, lista);
}
function setModo(color){
  modoLapiz = color;
  lienzo.style.pointerEvents = color ? 'auto' : 'none';
  lienzo.style.touchAction = color ? 'none' : '';
  $('#foto-wrap').classList.toggle('dibujando', !!color);
  document.querySelectorAll('#barra-dibujo .herr').forEach(b => b.classList.remove('activa'));
  if (color) document.querySelector(`#barra-dibujo .herr[data-color="${color}"]`).classList.add('activa');
  else $('#herr-marca').classList.add('activa');
  $('#ayuda-foto').textContent = color
    ? 'Dibuja con el dedo sobre la foto. Pulsa 📍 para volver a las marcas numeradas.'
    : 'Toca sobre la foto para añadir una marca numerada, o elige un color y dibuja a mano.';
}
$('#herr-marca').onclick = () => setModo(null);
document.querySelectorAll('#barra-dibujo .color').forEach(b => { b.onclick = () => setModo(b.dataset.color); });
$('#herr-deshacer').onclick = async () => {
  if (!fotoActual || !fotoActual.trazos.length) return;
  fotoActual.trazos.pop();
  await guardar('fotos', fotoActual);
  pintarTrazos();
};
function posLienzo(e){
  const r = lienzo.getBoundingClientRect();
  return { x: (e.clientX - r.left) / r.width, y: (e.clientY - r.top) / r.height };
}
lienzo.addEventListener('pointerdown', e => {
  if (!modoLapiz) return;
  e.preventDefault();
  lienzo.setPointerCapture(e.pointerId);
  trazoActual = { color: modoLapiz, grosor: 0.008, puntos: [posLienzo(e)] };
});
lienzo.addEventListener('pointermove', e => {
  if (!trazoActual) return;
  trazoActual.puntos.push(posLienzo(e));
  pintarTrazos();
});
async function finTrazo(){
  if (!trazoActual) return;
  if (trazoActual.puntos.length > 1){
    fotoActual.trazos.push(trazoActual);
    trazoActual = null;
    try { await guardar('fotos', fotoActual); } catch (e){ alert('No se pudo guardar el trazo.\n\n' + e.message); }
  } else trazoActual = null;
  pintarTrazos();
}
lienzo.addEventListener('pointerup', finTrazo);
lienzo.addEventListener('pointercancel', finTrazo);
function pintarMarcas(){
  document.querySelectorAll('.marca').forEach(m => m.remove());
  const wrap = $('#foto-wrap');
  fotoActual.marcas.forEach((m, i) => {
    if (m.x == null) return;
    const div = document.createElement('div');
    div.className = 'marca';
    div.textContent = i + 1;
    div.style.left = (m.x * 100) + '%';
    div.style.top = (m.y * 100) + '%';
    div.onclick = ev => { ev.stopPropagation(); editarMarca(i); };
    wrap.appendChild(div);
  });
}
function pintarCambios(){
  const cont = $('#lista-cambios');
  cont.innerHTML = fotoActual.marcas.length ? '' : '<div class="vacio" style="padding:18px">Sin cambios anotados.</div>';
  fotoActual.marcas.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'cambio-item';
    div.innerHTML = `<div class="cambio-num ${m.x == null ? 'sin' : ''}">${m.x == null ? '·' : i + 1}</div><div class="cambio-txt"></div>`;
    div.querySelector('.cambio-txt').textContent = m.texto;
    div.onclick = () => editarMarca(i);
    cont.appendChild(div);
  });
}
$('#foto-wrap').onclick = e => {
  if (modoLapiz) return; // en modo lápiz no se ponen marcas
  const img = $('#foto-img');
  const r = img.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width, y = (e.clientY - r.top) / r.height;
  if (x < 0 || x > 1 || y < 0 || y > 1) return;
  marcaEditando = { nueva: true, x, y };
  abrirModal('Nueva marca', '');
};
$('#btn-cambio-libre').onclick = () => {
  marcaEditando = { nueva: true, x: null, y: null };
  abrirModal('Cambio sin marca', '');
};
function editarMarca(i){
  marcaEditando = { nueva: false, indice: i };
  abrirModal('Editar cambio', fotoActual.marcas[i].texto, true);
}
$('#btn-borrar-foto').onclick = async () => {
  if (!confirm('¿Eliminar esta foto y sus cambios?')) return;
  await borrar('fotos', fotoActual.id);
  abrirProyecto(proyectoActual.id);
};

/* ---------- Modal ---------- */
function abrirModal(titulo, texto, conBorrar){
  $('#modal-titulo').textContent = titulo;
  $('#modal-texto').value = texto;
  $('#modal-borrar').style.display = conBorrar ? 'block' : 'none';
  $('#modal').classList.add('activa');
  setTimeout(() => $('#modal-texto').focus(), 50);
}
function cerrarModal(){ $('#modal').classList.remove('activa'); marcaEditando = null; }
$('#modal-cancelar').onclick = cerrarModal;
$('#modal').onclick = e => { if (e.target === $('#modal')) cerrarModal(); };
$('#modal-guardar').onclick = async () => {
  const texto = $('#modal-texto').value.trim();
  if (!texto){ alert('Escribe la descripción del cambio.'); return; }
  try {
    if (marcaEditando.nueva) fotoActual.marcas.push({ x: marcaEditando.x, y: marcaEditando.y, texto });
    else fotoActual.marcas[marcaEditando.indice].texto = texto;
    await guardar('fotos', fotoActual);
    cerrarModal(); pintarMarcas(); pintarCambios();
  } catch (e){ alert('No se pudo guardar el cambio.\n\n' + e.message); }
};
$('#modal-borrar').onclick = async () => {
  fotoActual.marcas.splice(marcaEditando.indice, 1);
  await guardar('fotos', fotoActual);
  cerrarModal(); pintarMarcas(); pintarCambios();
};

/* ---------- Logo para el Word (se dibuja en canvas) ---------- */
async function logoPNG(){
  try { await document.fonts.load('110px "Bebas Neue"'); } catch (e){}
  const c = document.createElement('canvas');
  c.width = 1000; c.height = 220;
  const g = c.getContext('2d');
  g.fillStyle = '#fff'; g.fillRect(0, 0, c.width, c.height);
  g.strokeStyle = '#F2611C'; g.lineWidth = 26; g.lineCap = 'round';
  g.beginPath(); g.moveTo(72, 24); g.quadraticCurveTo(20, 110, 72, 196); g.stroke();
  g.beginPath(); g.moveTo(928, 24); g.quadraticCurveTo(980, 110, 928, 196); g.stroke();
  g.fillStyle = '#111114';
  if ('letterSpacing' in g) g.letterSpacing = '8px';
  g.font = '110px "Bebas Neue", "Arial Narrow", sans-serif';
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.fillText('MAPRO ARAGÓN', 500, 118);
  const blob = await new Promise(res => c.toBlob(res, 'image/png'));
  return { datos: await blob.arrayBuffer(), ancho: c.width, alto: c.height };
}

/* ---------- Exportar a Word ---------- */
async function fotoConMarcas(f){
  // Devuelve {datos, ancho, alto} de la foto con las marcas dibujadas encima
  const img = await new Promise((res, rej) => {
    const i = new Image();
    i.onload = () => res(i);
    i.onerror = rej;
    i.src = URL.createObjectURL(f.blob);
  });
  const c = document.createElement('canvas');
  c.width = img.width; c.height = img.height;
  const g = c.getContext('2d');
  g.drawImage(img, 0, 0);
  URL.revokeObjectURL(img.src);
  dibujarTrazos(g, c.width, c.height, f.trazos || []);
  const radio = Math.max(16, c.width * 0.022);
  let n = 0;
  for (const m of f.marcas){
    if (m.x == null) continue;
    n++;
    const cx = m.x * c.width, cy = m.y * c.height;
    g.beginPath(); g.arc(cx, cy, radio, 0, Math.PI * 2);
    g.fillStyle = '#F2611C'; g.fill();
    g.lineWidth = radio * 0.16; g.strokeStyle = '#fff'; g.stroke();
    g.fillStyle = '#fff';
    g.font = `bold ${radio * 1.15}px sans-serif`;
    g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillText(String(n), cx, cy + radio * 0.05);
  }
  const blob = await new Promise(res => c.toBlob(res, 'image/jpeg', 0.85));
  return { datos: await blob.arrayBuffer(), ancho: c.width, alto: c.height };
}

async function generarWord(){
  const { Document, Packer, Paragraph, TextRun, ImageRun, AlignmentType } = docx;
  const p = proyectoActual;
  const fotos = await fotosDe(p.id);
  if (!fotos.length){ alert('Añade al menos una foto antes de generar el Word.'); return null; }
  $('#estado-export').textContent = 'Generando documento…';

  const logo = await logoPNG();
  const anchoLogo = 230;
  const hijos = [
    new Paragraph({ alignment: AlignmentType.CENTER, spacing: { after: 200 },
      children: [new ImageRun({ data: logo.datos,
        transformation: { width: anchoLogo, height: Math.round(anchoLogo * logo.alto / logo.ancho) } })] }),
    new Paragraph({ alignment: AlignmentType.CENTER, spacing: { after: 60 },
      children: [new TextRun({ text: 'MODIFICACIONES PROTOTIPO', bold: true, size: 32 })] }),
    new Paragraph({ alignment: AlignmentType.CENTER, spacing: { after: 240 },
      children: [new TextRun({ text: `${p.mpr} — ${p.nombre}`, bold: true, size: 26 })] }),
    new Paragraph({ spacing: { after: 60 }, children: [
      new TextRun({ text: 'Pedido: ', bold: true }), new TextRun(p.pedido || '—') ] }),
    new Paragraph({ spacing: { after: 60 }, children: [
      new TextRun({ text: 'Dimensiones: ', bold: true }), new TextRun(p.dimensiones || '—') ] }),
    new Paragraph({ spacing: { after: 60 }, children: [
      new TextRun({ text: 'Cliente: ', bold: true }), new TextRun(p.cliente || '—') ] }),
    new Paragraph({ spacing: { after: 300 }, children: [
      new TextRun({ text: 'Fecha de revisión: ', bold: true }), new TextRun(p.fecha) ] })
  ];

  for (let i = 0; i < fotos.length; i++){
    const f = fotos[i];
    const im = await fotoConMarcas(f);
    const anchoDoc = 580;
    hijos.push(new Paragraph({ spacing: { before: 240, after: 120 },
      children: [new TextRun({ text: `FOTO ${i + 1}`, bold: true, size: 24 })] }));
    hijos.push(new Paragraph({ alignment: AlignmentType.CENTER, spacing: { after: 120 },
      children: [new ImageRun({ data: im.datos,
        transformation: { width: anchoDoc, height: Math.round(anchoDoc * im.alto / im.ancho) } })] }));
    let n = 0;
    for (const m of f.marcas){
      const etiqueta = m.x == null ? '•' : `${++n}.`;
      hijos.push(new Paragraph({ spacing: { after: 60 }, indent: { left: 360 },
        children: [new TextRun({ text: `${etiqueta} `, bold: true }), new TextRun(m.texto)] }));
    }
    if (!f.marcas.length)
      hijos.push(new Paragraph({ indent: { left: 360 },
        children: [new TextRun({ text: 'Sin modificaciones anotadas.', italics: true })] }));
  }

  const doc = new Document({ sections: [{ children: hijos }] });
  const blob = await Packer.toBlob(doc);
  const nombre = `Cambios_${p.mpr.replace(/[^\w-]+/g, '_')}_${p.fecha.replace(/\//g, '-')}.docx`;
  $('#estado-export').textContent = '';
  return { blob, nombre };
}

$('#btn-export').onclick = async () => {
  try {
    const r = await generarWord();
    if (!r) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(r.blob);
    a.download = r.nombre;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 30000);
    $('#estado-export').textContent = 'Word descargado: ' + r.nombre;
  } catch (e){
    $('#estado-export').textContent = 'Error al generar el Word: ' + e.message;
  }
};
$('#btn-compartir').onclick = async () => {
  try {
    const r = await generarWord();
    if (!r) return;
    const archivo = new File([r.blob], r.nombre,
      { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
    if (navigator.canShare && navigator.canShare({ files: [archivo] }))
      await navigator.share({ files: [archivo], title: r.nombre });
    else
      $('#estado-export').textContent = 'Este dispositivo no permite compartir archivos; usa "Generar Word".';
  } catch (e){
    if (e.name !== 'AbortError') $('#estado-export').textContent = 'Error al compartir: ' + e.message;
  }
};

/* ---------- Utilidades y arranque ---------- */
function esc(t){ const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
if ('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.update();                                   // busca versión nueva en cada arranque
    setInterval(() => reg.update(), 60 * 60 * 1000); // y cada hora si la app sigue abierta
  });
  // Cuando se activa una versión nueva, recarga para aplicarla al momento
  let recargado = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (recargado) return;
    recargado = true;
    location.reload();
  });
}

    '(no en el navegador de WhatsApp ni en navegación privada) y, mejor aún, instálala en la pantalla de inicio.</div></div>';
});
